<!doctype html><html><head><meta charset=utf-8><meta name=viewport content="width=device-width,initial-scale=1"><title>Raymarched mountains</title><style>html,body{margin:0;height:100%;background:#000;overflow:hidden}canvas{display:block;width:100vw;height:100vh;cursor:crosshair}</style></head><body><canvas id=c></canvas><script id=f type=x-shader>float hash(vec2 p){p=fract(p*vec2(123.34,456.21));p+=dot(p,p+45.32);return fract(p.x*p.y);}float noise(vec2 p){vec2 i=floor(p),f=fract(p);vec2 u=f*f*(3.0-2.0*f);float a=hash(i),b=hash(i+vec2(1,0)),c=hash(i+vec2(0,1)),d=hash(i+vec2(1,1));return mix(mix(a,b,u.x),mix(c,d,u.x),u.y);}const mat2 m2=mat2(0.8,-0.6,0.6,0.8);float fbm2(vec2 p){float h=0.0,a=0.5;for(int i=0;i<5;i++){h+=a*noise(p);p=m2*p*2.0;a*=0.5;}return h;}vec3 noised(vec2 x){vec2 i=floor(x),f=fract(x);vec2 u=f*f*f*(f*(f*6.0-15.0)+10.0);vec2 du=30.0*f*f*(f*(f-2.0)+1.0);float a=hash(i),b=hash(i+vec2(1,0)),c=hash(i+vec2(0,1)),d=hash(i+vec2(1,1));return vec3(a+(b-a)*u.x+(c-a)*u.y+(a-b-c+d)*u.x*u.y,du*(vec2(b-a,c-a)+(a-b-c+d)*u.yx));}const float H=16.0;vec2 warp(vec2 x){vec2 w=vec2(noise(x*0.012),noise(x*0.012+vec2(31.4,12.1)));return x+(w-0.5)*22.0;}float shapeM(vec2 x){vec2 p=warp(x)*0.022;float a=0.0,b=1.0;vec2 d=vec2(0.0);for(int i=0;i<7;i++){vec3 n=noised(p);d+=n.yz;a+=b*n.x/(1.0+dot(d,d));b*=0.5;p=m2*p*2.0;}return a;}float shapeH(vec2 x){vec2 p=warp(x)*0.022;float a=0.0,b=1.0;vec2 d=vec2(0.0);for(int i=0;i<11;i++){vec3 n=noised(p);d+=n.yz;a+=b*n.x/(1.0+dot(d,d));b*=0.5;p=m2*p*2.0;}return a;}float terrainM(vec2 x){return H*shapeM(x);}float terrainH(vec2 x){return H*shapeH(x);}float castRay(vec3 ro,vec3 rd){float t=0.5,tmax=520.0;for(int i=0;i<300;i++){vec3 p=ro+t*rd;float h=p.y-terrainM(p.xz);if(h<0.0015*t||t>tmax)break;t+=0.4*h;}return(t>tmax)?-1.0:t;}vec3 calcNormal(vec3 p,float t){vec2 e=vec2(0.0015*t+0.01,0.0);return normalize(vec3(terrainH(p.xz-e.xy)-terrainH(p.xz+e.xy),2.0*e.x,terrainH(p.xz-e.yx)-terrainH(p.xz+e.yx)));}float shadow(vec3 ro,vec3 rd){float res=1.0,t=0.5;for(int i=0;i<40;i++){vec3 p=ro+t*rd;float h=p.y-terrainM(p.xz);res=min(res,12.0*h/t);t+=max(0.5,h);if(res<0.01||p.y>H*1.5)break;}return clamp(res,0.0,1.0);}vec3 sky(vec3 ro,vec3 rd,vec3 sun){vec3 col=mix(vec3(0.34,0.56,0.9),vec3(0.06,0.18,0.46),clamp(rd.y*1.3,0.0,1.0));float sd=clamp(dot(rd,sun),0.0,1.0);col=mix(col,vec3(0.95,0.78,0.6),pow(sd,5.0)*0.55*clamp(1.0-rd.y*2.5,0.0,1.0));col+=vec3(1.0,0.9,0.65)*pow(sd,180.0);col+=vec3(1.0,0.7,0.4)*pow(sd,8.0)*0.25;if(rd.y>0.005){float tp=(95.0-ro.y)/rd.y;vec2 cp=(ro+rd*tp).xz*0.006+vec2(iTime*0.012,0.0);float cl=smoothstep(0.34,0.62,fbm2(cp*1.3));float li=smoothstep(0.34,0.62,fbm2((cp+sun.xz*0.10)*1.3));vec3 cc=mix(vec3(0.6,0.64,0.76),vec3(1.0,0.99,0.96),clamp((cl-li)*3.0+0.7,0.0,1.0));col=mix(col,cc,cl*smoothstep(0.0,0.12,rd.y)*0.95);}return col;}void mainImage(out vec4 fragColor,in vec2 fragCoord){vec2 uv=(fragCoord-0.5*iResolution.xy)/iResolution.y;vec3 sun=normalize(vec3(-0.95,0.28,0.2));float yaw=(0.5-uMouseX)*1.6;float pitch=-(uMouseY-0.5)*0.5-0.30;vec3 ro=vec3(0.0,30.0,iTime*4.0);vec3 ww=normalize(vec3(sin(yaw),pitch,cos(yaw)));vec3 uu=normalize(cross(ww,vec3(0,1,0))),vv=cross(uu,ww);vec3 rd=normalize(uu*uv.x+vv*uv.y+ww*1.4);vec3 col;float t=castRay(ro,rd);if(t<0.0){col=sky(ro,rd,sun);}else{vec3 p=ro+t*rd;vec3 n=calcNormal(p,t);float slope=n.y,h01=clamp(p.y/H,0.0,1.0);vec3 grass=vec3(0.13,0.27,0.07),rock=vec3(0.30,0.24,0.18),snow=vec3(0.95,0.96,1.0);vec3 mat=mix(rock,grass,smoothstep(0.55,0.82,slope));mat=mix(mat,snow,smoothstep(0.55,0.78,h01)*smoothstep(0.45,0.75,slope));float dif=clamp(dot(n,sun),0.0,1.0),sh=0.28+0.72*shadow(p+n*0.2+sun*0.3,sun),skyl=clamp(0.5+0.5*n.y,0.0,1.0);float ao=clamp(0.4+0.6*h01,0.0,1.0);col=mat*(vec3(1.45,1.18,0.85)*dif*sh+vec3(0.24,0.32,0.48)*skyl*ao);vec3 fogCol=mix(vec3(0.55,0.66,0.82),vec3(0.95,0.72,0.5),pow(clamp(dot(rd,sun),0.0,1.0),5.0));fogCol=mix(fogCol,sky(ro,rd,sun),0.6);col=mix(col,fogCol,1.0-exp(-0.00009*t*t));}col=col/(1.0+col*0.32)*1.18;vec2 q=fragCoord/iResolution.xy;col*=0.5+0.5*pow(16.0*q.x*q.y*(1.0-q.x)*(1.0-q.y),0.12);col=pow(col,vec3(0.4545));fragColor=vec4(col,1.0);}</script><script>var c=document.getElementById("c"),g=c.getContext("webgl2");function S(t,s){var o=g.createShader(t);g.shaderSource(o,s);g.compileShader(o);return o}var P=g.createProgram();g.attachShader(P,S(g.VERTEX_SHADER,"#version 300 es\nin vec2 p;void main(){gl_Position=vec4(p,0,1);}"));g.attachShader(P,S(g.FRAGMENT_SHADER,"#version 300 es\nprecision highp float;uniform vec3 iResolution;uniform float iTime,uMouseX,uMouseY;out vec4 o;\n"+f.textContent+"\nvoid main(){mainImage(o,gl_FragCoord.xy);}"));g.bindAttribLocation(P,0,"p");g.linkProgram(P);var b=g.createBuffer();g.bindBuffer(34962,b);g.bufferData(34962,new Float32Array([-1,-1,3,-1,-1,3]),35044);g.useProgram(P);g.enableVertexAttribArray(0);g.vertexAttribPointer(0,2,5126,false,0,0);var Lr=g.getUniformLocation(P,"iResolution"),T=g.getUniformLocation(P,"iTime"),X=g.getUniformLocation(P,"uMouseX"),Y=g.getUniformLocation(P,"uMouseY"),tx=.5,ty=.42,x=.5,y=.42;function z(){var w=innerWidth,h=innerHeight,k=Math.min(1,820/Math.max(w,h)),W=Math.max(2,w*k|0),Hh=Math.max(2,h*k|0);c.width=W;c.height=Hh;g.viewport(0,0,W,Hh);g.uniform3f(Lr,W,Hh,1)}z();onresize=z;onpointermove=function(e){tx=e.clientX/innerWidth;ty=e.clientY/innerHeight};var s=performance.now();(function L(){x+=(tx-x)*.05;y+=(ty-y)*.05;g.uniform1f(T,(performance.now()-s)/1e3);g.uniform1f(X,x);g.uniform1f(Y,y);g.drawArrays(4,0,3);requestAnimationFrame(L)})();</script></body></html>
